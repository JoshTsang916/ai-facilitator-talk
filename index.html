<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>與 AI 共舞｜Josh / 人生鍛造所</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">

  <!-- 品牌主題 -->
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

  <!-- ============================================================
       Sidebar：頁面導航列（按 S 鍵 toggle）
       ============================================================ -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-inner" id="sidebar-list">
      <!-- JS 動態生成 -->
    </div>
  </nav>

  <!-- ============================================================
       主內容區：所有頁面 DOM 預先建好
       ============================================================ -->
  <main id="stage">
    <!-- JS 動態生成所有頁面 -->
  </main>

  <!-- 底部進度條 -->
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>

  <!-- QR Code 生成（本地備份） -->
  <script src="js/qrcode.min.js"></script>

  <!-- 專案腳本（工作坊型：無 Supabase） -->
  <script src="js/timer.js"></script>

  <script>
    /**
     * 簡報 SPA 核心控制器
     * 純 HTML/CSS/JS，不依賴任何框架
     */
    (function () {
      'use strict';

      // ============================================================
      // PAGES 陣列（4/16 引導學院 AI 分享 — 14 NLM slides + HTML 增補頁）
      // ============================================================
      const PAGES = [
        // ==== 開場 ====
        { id: 'cover', type: 'image', src: 'slides/slide-01.webp', title: '封面：與 AI 共舞', section: '開場' },
        { id: 'n8n-story', type: 'story', title: 'n8n 三場反省', text: '去年我深入研究 n8n，\n也開了三場 n8n 工作坊。\n\n但我必須老實說——\n如果想帶大家今天能跑通 n8n，\n我們要睡在這邊。', section: '' },
        { id: 'tool-cost', type: 'image', src: 'slides/slide-02.webp', title: '越強的工具，門檻越高', section: '' },
        { id: 'find-skill', type: 'text', title: '我發現了 skill', text: '不是每個人都有時間和精力\n去搗鼓那些很強但成本太高的工具。\n\n於是我開始研究——\n有沒有什麼概念，門檻不高但效果不錯？\n\n我發現了一個東西，\n它叫做 skill。', section: '' },
        { id: 'ai-status-check', type: 'text', title: '先問大家', text: '先問大家——\n目前你是怎麼用 AI 的？\n用來做些什麼？\n有沒有遇到什麼問題？', section: '' },

        // ==== 觀念地基 ====
        { id: 'word-chain', type: 'image', src: 'slides/slide-03.webp', title: 'AI 是文字接龍', section: '觀念地基' },
        { id: 'word-chain-game', type: 'text', title: '互動：文字接龍', text: '我說「台」，\n大家會想接什麼？\n\n台灣？\n那再來呢？', section: '' },
        { id: 'facilitator-bridge', type: 'quote', title: '引導師母語橋', text: '我們大家都會引導人。\n而現在 AI 更需要我們的引導，\n因為他只是在做計算，\n他並不是真的會思考。', section: '' },
        { id: 'context-onion', type: 'image', src: 'slides/slide-04.webp', title: '上下文的洋蔥結構', section: '' },
        { id: 'design-actively', type: 'quote', title: '主動設計', text: '重點不是「怎麼問」，\n而是「先布置好它眼前看到的世界」。\n\n我們要主動去設計\nAI 所看見的。', section: '' },

        // ==== 第 1 層 preferences ====
        { id: 'quota-warning', type: 'callback', title: 'Quota 開場提醒', text: '我們等下用 free 帳號\n跟大家一起跑。\n\n前面設定 preferences 跟 memory\n不要聊太多——\n用量留給最後跑 skill 才用。\n\n這是我昨天測試時自己撞到的坑，\n先讓你們知道。', section: '第 1 層 preferences' },
        { id: 'preferences-rule', type: 'image', src: 'slides/slide-05.webp', title: '偏好設定：給條件，不給命令', section: '' },
        { id: 'contradiction-pain', type: 'story', title: '矛盾痛點', text: '你寫「請簡潔回答」，\n下午又補一句「請給我詳細解釋」——\nAI 不知道該聽誰。\n\n你寫「請永遠用繁體中文」，\n但偏好設定本身寫了一段全英文——\nAI 會混亂。', section: '' },
        { id: 'condition-not-command', type: 'quote', title: '給條件不給命令', text: '❌ 「請簡潔回答」\n\n✅ 「回答長度符合問題複雜度，\n　　簡單問題不要給長答案」', section: '' },

        // ==== 第 2 層 memory ====
        { id: 'memory-auto', type: 'image', src: 'slides/slide-06.webp', title: '記憶：不要盲目相信自動產生', section: '第 2 層 memory' },
        { id: 'gemini-story', type: 'story', title: '35 坐地能吸土', text: '我幾個月前跟 Gemini\n天馬行空地討論 podcast 名稱，\n說我想改叫「35 坐地能吸土」，\n還讓他做了封面——\n當然是開玩笑的。\n\n結果最近我發現，\n她以為我的 Podcast\n真的叫「35 坐地能吸土」。\n\n重點是——\n我還沒辦法改掉她這個錯誤認知。', section: '' },
        { id: 'shared-account-story', type: 'story', title: '共用帳號 100 元 / 20 人', text: '前兩年 ChatGPT 剛出來的時候，\n我有跟別人共用過——\n一個月 100 元，\n但同時給 20 個人用。\n\n10 幾 20 個人的對話，\n每個人需求不一樣，\n記憶會有非常多矛盾，\n會嚴重影響 AI 的產出。', section: '' },
        { id: 'memory-relocate-tip', type: 'text', title: 'Pro Tip：搬家提示詞', text: 'Claude 的記憶設定有個內建提示詞——\n你可以拿回 ChatGPT / Gemini 送出，\n他們會把記得的關於你的事情吐出來。\n\n貼回 Claude，\n你的記憶就搬家完成了。\n\n換 AI 的轉換成本，\n趨近於零。', section: '' },

        // ==== L2→L3 過渡 ====
        { id: 'context-pollution', type: 'image', src: 'slides/slide-07.webp', title: '記憶塞太多 AI 會分心變笨', section: 'L2→L3 過渡' },
        { id: 'attention-diluted', type: 'quote', title: '注意力被稀釋', text: '你想專心討論英文，\nAI 卻在思考你的臥推多少公斤。\n\n那怎麼辦？\n→ 這時候就要有 skill 出馬了。', section: '' },

        // ==== 第 3 層 skill ====
        { id: 'skill-toolbox', type: 'image', src: 'slides/slide-08.webp', title: 'Skill 是你的專屬工具箱', section: '第 3 層 skill' },
        { id: 'facilitator-toolbox', type: 'callback', title: '引導師工具箱類比', text: '你是引導師——\n要設計工作坊、整理活動回饋、\n寫個案分析、設計 ORID 提問。\n\n四件事全塞一個對話，\nAI 會搞混。\n\n針對每件事做一個 skill，\n就像你的工具箱——\n需要哪個拿哪個。', section: '' },

        // ==== Fractal 5 階段 ====
        { id: 'fractal-stage-1-2', type: 'image', src: 'slides/slide-09.webp', title: '不問問題的 AI 是個爛引導者', section: 'Fractal 5 階段' },
        { id: 'good-facilitator', type: 'quote', title: '好引導者的金句', text: '好的引導者\n會先問問題再回應。\n\nAI 沒問問題就答\n= AI 是個爛引導者。', section: '' },
        { id: 'fractal-stage-3', type: 'image', src: 'slides/slide-10.webp', title: '從單向糾正升級為協作設計', section: '' },
        { id: 'collaborative-design', type: 'text', title: 'Josh 高級招（meta 升級）', text: '不要停在「指責 AI 沒問夠」。\n\n升級到——\n「我們先一起列出要問什麼，\n然後你再問我。」\n\nAI 從執行者變成協作者。\n\nClaude 列的清單，\n本身就是 skill 的骨架。', section: '' },
        { id: 'fractal-stage-4', type: 'image', src: 'slides/slide-11.webp', title: '對話封裝成永久資產', section: '' },
        { id: 'skill-md-showcase', type: 'text', title: 'workshop-planner SKILL.md 親測', text: '觸發句：\n「你能利用 skill creator\n把這次的規劃流程做成 skill 嗎？」\n\nClaude 自動完成：\n1. 讀 skill creator 文件\n2. 自動建檔\n3. 自我 review\n4. 打包 .skill 檔\n\n→ 你會親眼看到\n　 Claude 自己讀、自己建、\n　 自己 review、自己打包。', section: '' },
        { id: 'fractal-stage-5', type: 'image', src: 'slides/slide-12.webp', title: '即使遇到限制 Skill 也能帶著走', section: '' },
        { id: 'quota-callback', type: 'callback', title: '撞 quota → 故障變教材', text: '今天我用 free 帳號\n跟你們同步跑，\n撞 quota 是預期內的。\n\n撞到的時候，\n我切 Pro 帳號\n順便演示「手動匯入 skill」——\n故障變成第二個 demo。', section: '' },

        // ==== 學員動手 ====
        { id: 'your-turn', type: 'image', src: 'slides/slide-13.webp', title: '現在，換你動手', section: '學員動手' },
        { id: 'practice-prompt', type: 'text', title: '實作流程', text: '1. 開新對話\n2. 從 L1 直接問\n3. 加上下文 → 看到答案變好\n4. 封裝成 skill\n5. 測試\n\n卡住舉手，Josh 過去支援。\n\n時間夠的話，\n互相看看對方做的 skill。', section: '' },

        // ==== 收尾 ====
        { id: 'closing-key', type: 'image', src: 'slides/slide-14.webp', title: '主動性金句', section: '收尾' },
        { id: 'feeling-check', type: 'text', title: '你現在的感覺是什麼？', text: '今天我們設定了 AI、\n也跑了一次 skill 製作流程。\n\n問問大家——\n\n你現在的感覺是什麼？\n是興奮，還是焦慮？', section: '' },
        { id: 'main-quote', type: 'quote', title: '收尾關鍵句', text: '只要我們是有主動性的，\n可以把工具主動調整得更好，\n就不會被工具取代。', section: '' },

        // ==== Q&A + IG ====
        { id: 'qa', type: 'text', title: 'Q & A', text: 'Q & A\n\n10-15 分鐘\n\n有什麼想問的？\n哪個段落想再聊？', section: 'Q&A' },
        { id: 'ig-qr', type: 'text', title: '謝謝 + Follow IG', text: '謝謝大家\n\n— Josh / 人生鍛造所 —', section: '' },
      ];

      // ============================================================
      // 目前頁碼（0-based）
      // ============================================================
      let currentIndex = 0;

      // ============================================================
      // 頁面 DOM 建構
      // ============================================================
      const stage = document.getElementById('stage');

      /**
       * 將含換行的文字轉成帶 <br> 的 HTML
       * 用 textContent 賦值後再替換，防 XSS
       */
      function textToHtml(str) {
        const temp = document.createElement('span');
        temp.textContent = str;
        return temp.innerHTML.replace(/\n/g, '<br>');
      }

      /**
       * 時間線頁的節點資料
       */
      const TIMELINE_NODES = [
        { label: 'Talk 1', sub: '反芻三天' },
        { label: 'Talk 2', sub: '反芻一兩天' },
        { label: 'Talk 3-5', sub: '搞懂了減法' },
        { label: 'Talk 6', sub: '從容面對' },
        { label: 'Talk 7', sub: '50 分鐘' },
      ];

      // 為每種頁面建構 DOM
      PAGES.forEach((page, index) => {
        const el = document.createElement('div');
        el.className = 'page';
        el.id = `page-${page.id}`;
        el.dataset.index = index;
        el.dataset.type = page.type;

        switch (page.type) {
          // ────────────────────────────
          // NLM 圖片頁
          // ────────────────────────────
          case 'image':
            el.classList.add('page-image');
            el.innerHTML = `<img src="${page.src}" alt="${page.title}" draggable="false">`;
            break;

          // ────────────────────────────
          // 文字頁（手機翻面、自願分享等）
          // ────────────────────────────
          case 'text':
            el.classList.add('page-text');
            el.innerHTML = `
              <div class="text-content">
                <p>${textToHtml(page.text)}</p>
              </div>`;
            break;

          // ────────────────────────────
          // 故事頁
          // ────────────────────────────
          case 'story':
            el.classList.add('page-story');
            el.innerHTML = `
              <div class="story-block">
                <div class="story-quote-mark">\u201C</div>
                <div class="story-text">${textToHtml(page.text)}</div>
                <div class="story-decoration"></div>
              </div>`;
            break;

          // ────────────────────────────
          // 手機 Callback 頁
          // ────────────────────────────
          case 'callback':
            el.classList.add('page-callback');
            el.innerHTML = `
              <div class="callback-content">
                <p>${textToHtml(page.text)}</p>
              </div>`;
            break;

          // ────────────────────────────
          // 金句頁
          // ────────────────────────────
          case 'quote':
            el.classList.add('page-quote');
            el.innerHTML = `
              <div class="quote-decoration-top"></div>
              <p class="quote-text">${textToHtml(page.text)}</p>
              <div class="quote-decoration-bottom"></div>`;
            break;

          // ────────────────────────────
          // 呼吸過渡頁
          // ────────────────────────────
          case 'breathing':
            el.classList.add('page-breathing');
            el.innerHTML = `
              <div class="breathing-ring"></div>
              <p class="breathing-text">${textToHtml(page.text)}</p>`;
            break;

          // ────────────────────────────
          // 計時器頁
          // ────────────────────────────
          case 'timer':
            el.classList.add('page-timer');
            el.dataset.timer = page.timer;
            // 提示文字放在 timer 上方
            const timerTextHtml = page.text ? `<p class="timer-prompt">${textToHtml(page.text)}</p>` : '';
            el.innerHTML = `
              ${timerTextHtml}
              <div class="timer-container" data-duration="${page.timer}"></div>
              <div class="timer-hint">按空白鍵開始</div>`;
            break;

          // ────────────────────────────
          // QR Code 頁
          // ────────────────────────────
          case 'qr':
            el.classList.add('page-qr');
            const qrId = `qrcode-${page.questionId}`;
            const urlId = `qr-url-${page.questionId}`;
            el.innerHTML = `
              <p class="qr-question">${textToHtml(page.question)}</p>
              <div class="qr-wrapper" id="${qrId}"></div>
              <p class="qr-url" id="${urlId}"></p>`;
            break;

          // ────────────────────────────
          // 投稿牆頁
          // ────────────────────────────
          case 'wall':
            el.classList.add('page-wall');
            el.dataset.questionId = page.questionId;
            const wallId = `submission-wall-${page.questionId}`;
            const counterId = `submission-counter-${page.questionId}`;
            el.innerHTML = `
              <div class="wall-header">
                <div class="wall-counter">
                  <span class="wall-counter-number" id="${counterId}">0</span>
                  <span class="wall-counter-label">${page.counterLabel}</span>
                </div>
              </div>
              <div class="wall-grid" id="${wallId}"></div>`;
            break;

          // ────────────────────────────
          // 時間線頁
          // ────────────────────────────
          case 'timeline':
            el.classList.add('page-timeline');
            let nodesHtml = TIMELINE_NODES.map((n, i) => `
              <div class="tl-node ${i === TIMELINE_NODES.length - 1 ? 'tl-node-active' : ''}">
                <div class="tl-dot"></div>
                <span class="tl-label">${n.label}<br>${n.sub}</span>
              </div>`).join('');
            el.innerHTML = `
              <div class="tl-story">
                <p>從第一次到今天，六次站上台。<br>每次大象都來了，但每次牠待的時間都更短。</p>
              </div>
              <div class="tl-wrapper">
                <div class="tl-line"></div>
                <div class="tl-nodes">${nodesHtml}</div>
              </div>`;
            break;
        }

        stage.appendChild(el);
      });

      // 結尾頁加入 IG QR Code
      const igContent = document.querySelector('#page-ig-qr .text-content');
      if (igContent) {
        igContent.innerHTML += '<img src="joshigqrcode.png" alt="Instagram QR Code" style="max-width:280px;margin-top:1.5em;border-radius:8px;display:block;margin-left:auto;margin-right:auto;">';
      }

      // ============================================================
      // Sidebar 建構
      // ============================================================
      const sidebarList = document.getElementById('sidebar-list');
      let lastSection = '';

      PAGES.forEach((page, index) => {
        // 分站標記
        if (page.section && page.section !== lastSection) {
          lastSection = page.section;
          const sectionEl = document.createElement('div');
          sectionEl.className = 'sidebar-section';
          sectionEl.textContent = page.section;
          sidebarList.appendChild(sectionEl);
        }

        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.dataset.index = index;
        const numSpan = document.createElement('span');
        numSpan.className = 'sidebar-num';
        numSpan.textContent = index + 1;
        item.appendChild(numSpan);
        item.appendChild(document.createTextNode(' ' + page.title));
        item.addEventListener('click', () => goToPage(index));
        sidebarList.appendChild(item);
      });

      // ============================================================
      // 頁面切換核心
      // ============================================================
      const allPages = stage.querySelectorAll('.page');
      const sidebarItems = sidebarList.querySelectorAll('.sidebar-item');
      const progressFill = document.getElementById('progress-fill');

      function goToPage(index) {
        if (index < 0 || index >= PAGES.length) return;
        if (index === currentIndex) return;

        // 移除舊頁面 active
        allPages[currentIndex].classList.remove('active');
        sidebarItems.forEach(i => i.classList.remove('active'));

        currentIndex = index;

        // 啟用新頁面
        allPages[currentIndex].classList.add('active');

        // Sidebar 高亮
        const activeItem = sidebarList.querySelector(`.sidebar-item[data-index="${currentIndex}"]`);
        if (activeItem) {
          activeItem.classList.add('active');
          // 捲動到可見範圍
          activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        // 進度條
        const progress = (currentIndex / (PAGES.length - 1)) * 100;
        progressFill.style.width = progress + '%';

      }

      // 初始化第一頁
      allPages[0].classList.add('active');
      const firstSidebarItem = sidebarList.querySelector('.sidebar-item[data-index="0"]');
      if (firstSidebarItem) firstSidebarItem.classList.add('active');

      // ============================================================
      // 鍵盤狀態機
      // ============================================================
      /** 狀態：'navigation' | 'timer-active' */
      let keyboardState = 'navigation';
      let sidebarVisible = false;
      const sidebar = document.getElementById('sidebar');

      function toggleSidebar() {
        sidebarVisible = !sidebarVisible;
        sidebar.classList.toggle('open', sidebarVisible);
      }

      document.addEventListener('keydown', (e) => {
        // S 鍵：sidebar toggle（任何狀態都可用）
        if (e.code === 'KeyS' && !e.ctrlKey && !e.altKey && !e.metaKey) {
          e.preventDefault();
          toggleSidebar();
          return;
        }

        if (keyboardState === 'navigation') {
          // 方向鍵 / PageUp/PageDown 切頁
          if (['ArrowRight', 'ArrowDown', 'PageDown'].includes(e.code)) {
            e.preventDefault();
            goToPage(currentIndex + 1);
          } else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.code)) {
            e.preventDefault();
            goToPage(currentIndex - 1);
          }
          // 空白鍵在計時器頁啟動計時器
          else if (e.code === 'Space') {
            e.preventDefault();
            const pageData = PAGES[currentIndex];
            if (pageData.type === 'timer') {
              presentationTimer.startFromPage(allPages[currentIndex], pageData.timer);
            }
          }
        } else if (keyboardState === 'timer-active') {
          // 方向鍵鎖定
          if (['ArrowRight', 'ArrowDown', 'ArrowLeft', 'ArrowUp', 'PageDown', 'PageUp'].includes(e.code)) {
            e.preventDefault();
            return;
          }
          // 空白鍵：暫停/繼續
          if (e.code === 'Space') {
            e.preventDefault();
            presentationTimer.togglePause();
          }
          // Escape：退出計時器回 navigation
          if (e.code === 'Escape') {
            e.preventDefault();
            presentationTimer.abort();
          }
        }
      });

      // 防止瀏覽器預設捲動（僅主舞台區，側欄保留捲動）
      stage.addEventListener('wheel', (e) => { e.preventDefault(); }, { passive: false });

      // 狀態機 API（供 timer.js 呼叫）
      window.setKeyboardState = function (state) {
        keyboardState = state;
      };

      // ============================================================
      // 計時器初始化
      // ============================================================
      presentationTimer.init();

      // ============================================================
      // QR Code 生成
      // ============================================================
      function generateQR(containerId, url) {
        const container = document.getElementById(containerId);
        if (!container || container.children.length > 0) return;
        new QRCode(container, {
          text: url,
          width: 220,
          height: 220,
          colorDark: '#5C4033',
          colorLight: '#FFF8F0',
          correctLevel: QRCode.CorrectLevel.M
        });
      }

    })();
  </script>

</body>
